name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build session-core
        run: bun run --cwd packages/session-core build

      - name: Typecheck session-core
        run: bun run --cwd packages/session-core typecheck

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run tests (unit + browser isolation)
        run: bun run --cwd packages/session-core test
        env:
          TABGHOST_HOME: ${{ runner.temp }}/tabghost-ci

      - name: Smoke test CLI
        run: |
          bun run apps/desktop/src/cli.ts identities
          bun run apps/desktop/src/cli.ts create "CI Test" win-us-east
          bun run apps/desktop/src/cli.ts list
        env:
          TABGHOST_HOME: ${{ runner.temp }}/tabghost-cli
