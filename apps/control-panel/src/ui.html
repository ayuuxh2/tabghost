<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TabGhost — Control Panel</title>
  <style>
    :root{
      --bg:#0a0b0f; --panel:#12141b; --panel2:#171a23; --border:#242835;
      --fg:#e8eaf0; --muted:#8a90a2; --accent:#7c5cff; --accent2:#00d4a0;
      --danger:#ff5c7c; --radius:12px;
    }
    *{box-sizing:border-box}
    body{margin:0;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);color:var(--fg)}
    header{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid var(--border);
      position:sticky;top:0;background:rgba(10,11,15,.85);backdrop-filter:blur(8px);z-index:10}
    .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-weight:800;color:#fff}
    h1{font-size:16px;margin:0;letter-spacing:.3px}
    .tag{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:20px}
    main{max-width:1100px;margin:0 auto;padding:22px}
    .row{display:flex;gap:18px;flex-wrap:wrap}
    .col{flex:1;min-width:320px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
    .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:0 0 12px}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
    input,select{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--fg);
      padding:9px 10px;border-radius:8px;font-size:13px}
    button{background:var(--accent);color:#fff;border:0;padding:9px 14px;border-radius:8px;font-weight:600;
      cursor:pointer;font-size:13px}
    button:hover{filter:brightness(1.1)}
    button.ghost{background:transparent;border:1px solid var(--border);color:var(--fg)}
    button.danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
    button.mini{padding:5px 9px;font-size:12px}
    .item{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel2)}
    .item .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .item .name{font-weight:600}
    .item .meta{font-size:12px;color:var(--muted);margin-top:4px;word-break:break-all}
    .pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
    .pill.live{color:var(--accent2);border-color:var(--accent2)}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .empty{color:var(--muted);font-size:13px;padding:8px 0}
    .toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--border);
      padding:12px 16px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(8px);
      transition:.2s;max-width:360px}
    .toast.show{opacity:1;transform:none}
    .toast.err{border-color:var(--danger);color:var(--danger)}
    .brand-lock{font-size:11px;color:var(--muted);margin-left:auto}
    a{color:var(--accent)}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;z-index:50}
    .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;width:min(420px,92vw)}
    .modal h3{margin:0 0 14px;font-size:15px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
  </style>
</head>
<body>
  <header>
    <div class="logo">TG</div>
    <h1>TabGhost</h1>
    <span class="tag">Control Panel</span>
    <span class="brand-lock">isolated browser workspaces · open source</span>
  </header>
  <main>
    <div class="row">
      <div class="col">
        <div class="card">
          <h2>Create sub-profile</h2>
          <label>Label</label>
          <input id="f-label" placeholder="e.g. Agent — Acme tenant" />
          <label>Workspace / tenant</label>
          <input id="f-workspace" placeholder="default" />
          <label>Identity preset</label>
          <select id="f-identity"></select>
          <label>Proxy (optional, e.g. http://user:pass@host:port)</label>
          <input id="f-proxy" placeholder="leave blank for direct" />
          <div style="margin-top:14px"><button onclick="createProfile()">Create sub-profile</button></div>
        </div>
      </div>
      <div class="col">
        <div class="card">
          <h2>Sub-profiles</h2>
          <div id="profiles"><div class="empty">Loading…</div></div>
        </div>
        <div class="card">
          <h2>Live sessions</h2>
          <div id="sessions"><div class="empty">None</div></div>
        </div>
      </div>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <div id="modal" class="modal-back" style="display:none">
    <div class="modal">
      <h3 id="m-title">Launch session</h3>
      <div id="m-body"></div>
      <div class="modal-actions">
        <button class="ghost" id="m-cancel">Cancel</button>
        <button id="m-ok">Launch</button>
      </div>
    </div>
  </div>
  <script>
    const API = (window.TABGHOST_API || "") ;
    async function api(path, opts){
      const r = await fetch(API + path, Object.assign({headers:{'content-type':'application/json'}}, opts||{}));
      const j = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error || ('HTTP '+r.status));
      return j;
    }
    function toast(msg, err){
      const t=document.getElementById('toast'); t.textContent=msg;
      t.className='toast show'+(err?' err':''); setTimeout(()=>t.className='toast',2600);
    }
    async function loadIdentities(){
      const {identities}=await api('/identities');
      const sel=document.getElementById('f-identity');
      sel.innerHTML=identities.map(i=>`<option value="${i.id}">${i.label}</option>`).join('');
    }
    async function loadProfiles(){
      const el=document.getElementById('profiles');
      try{
        const {profiles}=await api('/profiles');
        if(!profiles.length){el.innerHTML='<div class="empty">No sub-profiles yet.</div>';return;}
        el.innerHTML=profiles.map(p=>`
          <div class="item">
            <div class="top">
              <span class="name">${esc(p.label)}</span>
              <span class="pill">${esc(p.workspace)}</span>
            </div>
            <div class="meta">${esc(p.identityId)}${p.proxy?' · proxy':''}<br>${p.id}</div>
            <div class="actions">
              <button class="mini" onclick="spawn('${p.id}')">Launch session</button>
              <button class="mini ghost" onclick="clone('${p.id}')">Clone</button>
              <button class="mini danger" onclick="del('${p.id}')">Delete</button>
            </div>
          </div>`).join('');
      }catch(e){el.innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
    }
    async function loadSessions(){
      const el=document.getElementById('sessions');
      try{
        const {sessions}=await api('/sessions');
        if(!sessions.length){el.innerHTML='<div class="empty">None</div>';return;}
        el.innerHTML=sessions.map(s=>`
          <div class="item">
            <div class="top">
              <span class="name">${s.id.slice(0,8)}…</span>
              <span class="pill live">${s.status} · ${s.pages}p</span>
            </div>
            <div class="meta">profile ${s.subProfileId}</div>
            <div class="actions">
              <button class="mini ghost" onclick="shot('${s.id}')">Screenshot</button>
              <button class="mini danger" onclick="closeSession('${s.id}')">Close</button>
            </div>
          </div>`).join('');
      }catch(e){el.innerHTML='<div class="empty">'+esc(e.message)+'</div>';}
    }
    function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    async function createProfile(){
      const label=val('f-label'); if(!label)return toast('Label required',true);
      const proxy=val('f-proxy');
      try{
        await api('/profiles',{method:'POST',body:JSON.stringify({
          label, workspace:val('f-workspace')||'default', identityId:val('f-identity'),
          proxy: proxy?{server:proxy}:undefined
        })});
        toast('Sub-profile created'); document.getElementById('f-label').value='';
        loadProfiles();
      }catch(e){toast(e.message,true);}
    }
    let modalOk=null;
    function showModal(title, bodyHtml, okLabel, onOk){
      document.getElementById('m-title').textContent=title;
      document.getElementById('m-body').innerHTML=bodyHtml;
      document.getElementById('m-ok').textContent=okLabel||'OK';
      document.getElementById('modal').style.display='grid';
      modalOk=onOk;
      const first=document.querySelector('#m-body input'); if(first){first.focus();first.select&&first.select();}
    }
    function hideModal(){document.getElementById('modal').style.display='none';modalOk=null;}
    document.getElementById('m-cancel').onclick=hideModal;
    document.getElementById('m-ok').onclick=async()=>{const fn=modalOk;hideModal();if(fn)await fn();};
    document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')hideModal();});
    function spawn(id){
      showModal('Launch session','<label>Start URL</label><input id="m-url" value="https://example.com" />','Launch',async()=>{
        const url=(document.getElementById('m-url')?.value||'').trim();
        try{await api('/sessions',{method:'POST',body:JSON.stringify({subProfileId:id,startUrl:url||'about:blank'})});toast('Session launched');loadSessions();}catch(e){toast(e.message,true);}
      });
    }
    async function clone(id){try{await api('/profiles/'+id+'/clone',{method:'POST',body:'{}'});toast('Cloned');loadProfiles();}catch(e){toast(e.message,true);}}
    async function del(id){showModal('Delete sub-profile','<p style="color:var(--muted);margin:0">This permanently deletes the sub-profile and all its isolated browser state (cookies, storage, cache). This cannot be undone.</p>','Delete',async()=>{try{await api('/profiles/'+id,{method:'DELETE'});toast('Deleted');loadProfiles();loadSessions();}catch(e){toast(e.message,true);}});}
    async function closeSession(id){try{await api('/sessions/'+id,{method:'DELETE'});toast('Closed');loadSessions();}catch(e){toast(e.message,true);}}
    async function shot(id){try{const{result}=await api('/sessions/'+id+'/actions',{method:'POST',body:JSON.stringify({action:'screenshot',fullPage:false})});const w=window.open();w.document.write('<img src="'+result.screenshot+'" style="max-width:100%">');}catch(e){toast(e.message,true);}}
    function val(id){return document.getElementById(id).value.trim();}
    loadIdentities().then(loadProfiles).then(loadSessions);
    setInterval(loadSessions,4000);
  </script>
</body>
</html>
