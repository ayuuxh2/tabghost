<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TabGhost — New Tab</title>
  <style>
    :root{
      --bg:#0a0b0f; --panel:#12141b; --panel2:#171a23; --border:#242835;
      --fg:#e8eaf0; --muted:#8a90a2; --accent:#7c5cff; --accent2:#00d4a0; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, #1a1030 0%, var(--bg) 55%);color:var(--fg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
    .ghost{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:38px;box-shadow:0 12px 40px rgba(124,92,255,.35);margin-bottom:18px}
    h1{font-size:28px;margin:0 0 4px;letter-spacing:.4px}
    .sub{color:var(--muted);margin-bottom:26px}
    .card{width:min(640px,100%);background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px 22px;margin-bottom:16px}
    .idrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .idrow:last-child{border-bottom:0}
    .idrow .k{color:var(--muted)}
    .idrow .v{font-family:ui-monospace,Menlo,Consolas,monospace;text-align:right;word-break:break-all}
    .badge{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--border);
      border-radius:20px;padding:5px 12px;font-size:12px;color:var(--accent2)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
    form{display:flex;gap:8px;width:min(640px,100%);margin-bottom:22px}
    input{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--fg);
      padding:12px 14px;border-radius:12px;font-size:15px}
    button{background:var(--accent);color:#fff;border:0;padding:12px 20px;border-radius:12px;font-weight:600;cursor:pointer}
    button:hover{filter:brightness(1.1)}
    .links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
    .links a{color:var(--fg);text-decoration:none;background:var(--panel);border:1px solid var(--border);
      padding:9px 14px;border-radius:10px;font-size:13px}
    .links a:hover{border-color:var(--accent)}
    footer{margin-top:28px;color:var(--muted);font-size:12px}
    footer a{color:var(--accent)}
  </style>
</head>
<body>
  <div class="ghost">👻</div>
  <h1>TabGhost</h1>
  <div class="sub">Isolated browser workspace — this tab runs in its own sandbox.</div>

  <form onsubmit="go(event)">
    <input id="q" placeholder="Search the web or enter a URL…" autofocus />
    <button type="submit">Go</button>
  </form>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <strong>This session's identity</strong>
      <span class="badge"><span class="dot"></span> isolated</span>
    </div>
    <div id="identity"><div class="idrow"><span class="k">Loading…</span><span class="v"></span></div></div>
  </div>

  <div class="links">
    <a href="https://github.com/ayuuxh2/tabghost" target="_blank">GitHub</a>
    <a href="https://mail.google.com" target="_blank">Gmail</a>
    <a href="https://x.com" target="_blank">X</a>
    <a href="https://youtube.com" target="_blank">YouTube</a>
    <a href="https://github.com/ayuuxh2/tabghost#readme" target="_blank">Docs</a>
  </div>

  <footer>Powered by <a href="https://github.com/ayuuxh2/tabghost" target="_blank">TabGhost</a> · one browser, many isolated profiles</footer>

  <script>
    function go(e){
      e.preventDefault();
      const raw=document.getElementById('q').value.trim();
      if(!raw)return;
      const looksUrl=/^https?:\/\//i.test(raw) || (/^[\w-]+(\.[\w-]+)+/.test(raw) && !raw.includes(' '));
      location.href = looksUrl ? (/^https?:\/\//i.test(raw)?raw:'https://'+raw)
                               : 'https://www.google.com/search?q='+encodeURIComponent(raw);
    }
    // Read this session's real, injected identity straight from the page.
    (function(){
      const rows=[
        ['Platform', navigator.platform],
        ['User agent', navigator.userAgent],
        ['Language', navigator.language],
        ['Timezone', Intl.DateTimeFormat().resolvedOptions().timeZone],
        ['CPU cores', String(navigator.hardwareConcurrency)],
        ['Device memory', (navigator.deviceMemory||'—')+' GB'],
        ['Screen', screen.width+'×'+screen.height],
      ];
      let webgl='—';
      try{
        const gl=document.createElement('canvas').getContext('webgl');
        const dbg=gl && gl.getExtension('WEBGL_debug_renderer_info');
        if(dbg) webgl=gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
      }catch(e){}
      rows.push(['WebGL', webgl]);
      document.getElementById('identity').innerHTML = rows.map(([k,v])=>
        `<div class="idrow"><span class="k">${k}</span><span class="v">${String(v).replace(/</g,'&lt;')}</span></div>`
      ).join('');
    })();
  </script>
</body>
</html>
