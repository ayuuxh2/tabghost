<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    body {
      width: 360px; margin: 0; font: 13px/1.4 system-ui, sans-serif;
      background: #0b0d12; color: #e7e9ee;
    }
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 14px; border-bottom:1px solid #1c2030;
    }
    header h1 { font-size:14px; margin:0; letter-spacing:.3px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#ef4444; display:inline-block; margin-right:6px; }
    .dot.on { background:#22c55e; }
    .wrap { padding:12px 14px; }
    .row { display:flex; gap:6px; margin-bottom:8px; }
    select, input, button {
      font:inherit; padding:6px 8px; border-radius:6px;
      border:1px solid #262c3d; background:#12151d; color:#e7e9ee;
    }
    select, input { flex:1; min-width:0; }
    button { cursor:pointer; background:#4f46e5; border-color:#4f46e5; color:#fff; white-space:nowrap; }
    button.ghost { background:transparent; border-color:#262c3d; color:#aab; }
    ul { list-style:none; margin:8px 0 0; padding:0; max-height:230px; overflow:auto; }
    li { border:1px solid #1c2030; border-radius:8px; padding:8px; margin-bottom:6px; }
    li .t { font-weight:600; }
    li .s { color:#8b93a7; font-size:11px; }
    .acts { display:flex; gap:4px; margin-top:6px; }
    .acts button { padding:4px 8px; font-size:11px; }
    .empty { color:#8b93a7; text-align:center; padding:14px; }
    a { color:#8b9dff; }
    footer { padding:8px 14px; border-top:1px solid #1c2030; font-size:11px; color:#8b93a7; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <header>
    <h1>TabGhost</h1>
    <span><span id="dot" class="dot"></span><span id="status">offline</span></span>
  </header>
  <div class="wrap">
    <div class="row">
      <select id="identity"></select>
    </div>
    <div class="row">
      <input id="label" placeholder="New sub-profile label" />
      <button id="create">Create</button>
    </div>
    <ul id="list"><li class="empty">Connecting…</li></ul>
  </div>
  <footer>
    <span id="count">—</span>
    <a href="#" id="options">Settings</a>
  </footer>
  <script type="module" src="src/popup.js"></script>
</body>
</html>
